services:
  webhook_listener:
    image: ghcr.io/necrolingus/nodejs_webhook_listener_v2:latest
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - 3088
    depends_on:
      webhook_listener_db:
        condition: service_healthy
    networks:
        - internal_proxy

  webhook_listener_db:
      image: postgres:17.2-alpine3.21
      restart: unless-stopped
      env_file:
        - .env
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASS}
      shm_size: 96mb
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $DB_USER"]
        interval: 5s
        timeout: 5s
        retries: 5
      volumes:
        - postgresdata_wl:/var/lib/postgresql/data
      networks:
        - internal_proxy

networks:
  internal_proxy:
    external: true

volumes:
  postgresdata_wl: